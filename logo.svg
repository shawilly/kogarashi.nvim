<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240" role="img" aria-labelledby="title desc">
  <title id="title">Kogarashi</title>
  <desc id="desc">Kogarashi logo with a circular winter icon and wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14151b"/>
      <stop offset="55%" stop-color="#1a1b22"/>
      <stop offset="100%" stop-color="#1f1f28"/>
    </linearGradient>
    <linearGradient id="waveA" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#7e9cd8"/>
      <stop offset="100%" stop-color="#957fb8"/>
    </linearGradient>
    <linearGradient id="waveB" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#c0a36e"/>
      <stop offset="100%" stop-color="#dca561"/>
    </linearGradient>
    <linearGradient id="waveC" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#8a9a7b"/>
      <stop offset="100%" stop-color="#7fb4ca"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <clipPath id="iconClip">
      <circle cx="120" cy="120" r="66"/>
    </clipPath>
  </defs>

  <rect x="8" y="8" width="884" height="224" rx="24" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <circle cx="120" cy="120" r="66" fill="#2a2a37" stroke="#54546d" stroke-width="2"/>
    <g clip-path="url(#iconClip)">
      <rect x="54" y="54" width="132" height="132" fill="#2d3343"/>
      <path d="M32 170C61 155 88 150 113 152C142 154 165 165 208 165V230H32Z" fill="url(#waveA)"/>
      <path d="M32 148C61 136 91 132 117 136C145 141 170 153 208 151V230H32Z" fill="url(#waveB)" fill-opacity="0.9"/>
      <path d="M32 126C55 110 85 105 112 109C143 113 168 127 208 125V230H32Z" fill="url(#waveC)" fill-opacity="0.95"/>
    </g>
    <g stroke="#f7f3e8" stroke-width="4" stroke-linecap="round">
      <line x1="120" y1="80" x2="120" y2="122"/>
      <line x1="98" y1="92" x2="142" y2="110"/>
      <line x1="98" y1="110" x2="142" y2="92"/>
      <line x1="106" y1="75" x2="134" y2="127"/>
      <line x1="134" y1="75" x2="106" y2="127"/>
    </g>
    <circle cx="120" cy="120" r="66" fill="none" stroke="#c8c093" stroke-opacity="0.15" stroke-width="10"/>
  </g>

  <g fill="#f2efe4">
    <text x="225" y="112" font-size="56" font-weight="700" letter-spacing="3" font-family="Georgia, 'Times New Roman', serif">
