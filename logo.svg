    </text>
    <text x="228" y="145" font-size="16" font-weight="600" letter-spacing="6" font-family="Arial, Helvetica, sans-serif" fill="#a6a08b">
      NEOVIM COLORSCHEME
    </text>
  </g>

  <g fill="#727169">
    <circle cx="829" cy="72" r="3"/>
    <circle cx="851" cy="72" r="3"/>
    <circle cx="840" cy="88" r="3"/>
  </g>
